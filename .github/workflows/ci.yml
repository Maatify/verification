# ============================================================
# verification Continuous Integration Pipeline
# ============================================================
# Purpose:
# - Run quality checks on every push / PR
# - Execute Unit tests
# - Execute Integration tests (MySQL)
# - Validate composer configuration
# - Run security audit
# - Run static analysis (PHPStan)
# - Ensure syntax integrity
#
# Design Principles:
# - Deterministic environment (no reliance on local secrets)
# - Real database (no SQLite fallback)
# - No external infrastructure required
# - Multi-PHP version matrix
# ============================================================

name: verification CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    # -------------------------------------------------
    # Global Environment (Shared Across All Steps)
    # -------------------------------------------------
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: verification_test
      DB_USERNAME: root
      DB_PASSWORD: root

      # Redis configuration for RateLimiter tests
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    # -------------------------------------------------
    # PHP Version Matrix
    # -------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3", "8.4" ]

    # -------------------------------------------------
    # Service Containers
    # -------------------------------------------------
    services:

      # -----------------------------
      # MySQL Database
      # -----------------------------
      mysql:
        image: mysql:9.2
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      # -----------------------------
      # Redis (RateLimiter tests)
      # -----------------------------
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:

      # -------------------------------------------------
      # 1) Checkout Repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP Runtime
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
          extensions: redis, pcntl

      # -------------------------------------------------
      # 3) Cache Composer Dependencies
      # -------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # -------------------------------------------------
      # 4) Validate composer.json Structure
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 5) Install Project Dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # -------------------------------------------------
      # 6) Verify Platform Requirements
      # -------------------------------------------------
      - name: Check platform requirements
        run: composer check-platform-reqs

      # -------------------------------------------------
      # 7) Security Audit (Fail on Vulnerabilities)
      # -------------------------------------------------
      - name: Composer Security Audit
        run: composer audit --format=plain

      # -------------------------------------------------
      # 8) Wait for MySQL to Become Ready
      # -------------------------------------------------
      - name: Wait for MySQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mysql-client
          for i in {1..20}; do
            mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USERNAME" -p"$DB_PASSWORD" && break
            sleep 2
          done

      # -------------------------------------------------
      # Wait for Redis to Become Ready
      # -------------------------------------------------
      - name: Wait for Redis
        run: |
          sudo apt-get install -y redis-tools
          for i in {1..20}; do
            redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" ping && break
            sleep 2
          done

      # -------------------------------------------------
      # 9) Create Test Database + Import Schema
      # -------------------------------------------------
      - name: Create test database and import schema
        run: |
          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USERNAME" \
            -p"$DB_PASSWORD" \
            -e "CREATE DATABASE IF NOT EXISTS \`$DB_DATABASE\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

          # استيراد الجداول
          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USERNAME" \
            -p"$DB_PASSWORD" \
            "$DB_DATABASE" < database/verification_codes.sql
          
          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USERNAME" \
            -p"$DB_PASSWORD" \
            "$DB_DATABASE" < database/verification_generation_locks.sql


      # -------------------------------------------------
      # 10) Run PHPUnit (Unit + Integration Tests)
      # -------------------------------------------------
      - name: Run PHPUnit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: verification_test
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: composer test

      # -------------------------------------------------
      # 11) Static Analysis (PHPStan)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 12) Syntax Lint Check
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find ./src ./tests -type f -name "*.php" -print0 \
            | xargs -0 -n1 php -l